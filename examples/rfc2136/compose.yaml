services:
  rfc2136:
    build:
      context: ../..
      dockerfile: examples/rfc2136/Dockerfile
    ports:
      - "${HOST_PORT:-5353}:5353/udp"
      - "${HOST_PORT:-5353}:5353/tcp"
    environment:
      NEOSERV_USERNAME: ${NEOSERV_USERNAME}       # Neoserv account email
      NEOSERV_PASSWORD: ${NEOSERV_PASSWORD}       # Neoserv account password
      NEOSERV_ZONE: ${NEOSERV_ZONE:-}             # optional: restrict updates to one zone
      RFC2136_TSIG_KEY: ${RFC2136_TSIG_KEY:-}     # optional: TSIG key name; default "acme."
      RFC2136_TSIG_SECRET: ${RFC2136_TSIG_SECRET} # base64-encoded TSIG shared secret
    restart: unless-stopped
